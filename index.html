<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Family Todos">
<title>Family Todos</title>
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./style.css">
</head>
<body>

<!-- Who are you? screen -->
<div id="screen-pick" class="screen hidden">
  <div class="pick-wrap">
    <p class="pick-label">Who are you?</p>
    <div id="pick-list" class="pick-list"></div>
  </div>
</div>

<!-- Main screen -->
<div id="screen-main" class="screen hidden">
  <header>
    <span id="header-name"></span>
    <button class="switch-btn" onclick="app.switchPerson()" title="Switch person">&#8645;</button>
  </header>

  <div id="intro-card" class="intro-card hidden">
    <p id="intro-text"></p>
  </div>

  <div id="todo-list"></div>

  <div id="empty-state" class="empty-state hidden">
    <p>All done! 🎉</p>
    <p class="muted">Add tasks via WhatsApp.</p>
  </div>

  <button class="refresh-btn" onclick="app.load()" title="Refresh">↻</button>
</div>

<div id="toast" class="toast hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./app.js"></script>
</body>
</html>
