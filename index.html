<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Family Todos</title>
  <link rel="manifest" href="./manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:    #16a34a;
      --green-lt: #dcfce7;
      --red:      #dc2626;
      --amber:    #d97706;
      --blue:     #2563eb;
      --gray-50:  #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-600: #4b5563;
      --gray-900: #111827;
      --tab-h:    56px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-bottom: calc(var(--tab-h) + env(safe-area-inset-bottom));
    }

    /* ── Header ── */
    header {
      background: var(--green);
      color: white;
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 1px 3px rgba(0,0,0,.15);
    }
    .app-title { font-size: 1.05rem; font-weight: 700; }
    #user-badge {
      font-size: .8rem;
      background: rgba(255,255,255,.2);
      border: none; color: white;
      padding: 4px 10px; border-radius: 999px;
      cursor: pointer; max-width: 110px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #user-badge:hover { background: rgba(255,255,255,.3); }

    /* ── Add bar ── */
    .add-bar {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      position: sticky;
      top: 56px;
      z-index: 9;
    }
    .add-row { display: flex; gap: 8px; }

    #item-input {
      flex: 1;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 1rem; outline: none;
      background: var(--gray-50);
      transition: border-color .15s;
    }
    #item-input:focus { border-color: var(--green); background: white; }
    #item-input::placeholder { color: var(--gray-400); }

    #mic-btn {
      width: 44px; min-width: 44px;
      border: 1.5px solid var(--gray-200); border-radius: 10px;
      background: white; color: var(--gray-400); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, color .15s, background .15s;
    }
    #mic-btn svg { width: 18px; height: 18px; }
    #mic-btn:hover { border-color: var(--green); color: var(--green); }
    #mic-btn.listening {
      border-color: var(--red); color: var(--red); background: #fee2e2;
      animation: pulse .8s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { box-shadow: 0 0 0 0 rgba(220,38,38,.3); }
      to   { box-shadow: 0 0 0 6px rgba(220,38,38,0); }
    }
    #add-btn {
      width: 44px; min-width: 44px;
      background: var(--green); color: white;
      border: none; border-radius: 10px; font-size: 1.5rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    #add-btn:hover { background: #15803d; }

    /* ── Assign pills (add bar) ── */
    .assign-row {
      display: flex; gap: 6px; align-items: center;
    }
    .assign-label { font-size: .72rem; color: var(--gray-400); white-space: nowrap; }
    .member-pill {
      flex: 1; height: 28px;
      border-radius: 999px; border: none;
      font-size: .72rem; font-weight: 700;
      color: white; cursor: pointer;
      opacity: 0.35;
      transition: opacity .15s, transform .1s;
    }
    .member-pill.selected { opacity: 1; transform: scale(1.08); }

    /* ── Blurb ── */
    #blurb-card {
      margin: 12px 16px 0;
      background: white;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: .85rem;
      color: var(--gray-600);
      line-height: 1.5;
      border-left: 3px solid var(--green);
      display: none;
    }
    #blurb-card.visible { display: block; }

    /* ── List ── */
    main { flex: 1; padding: 12px 0 16px; }
    #item-list { list-style: none; display: flex; flex-direction: column; gap: 1px; }

    .section-header {
      padding: 10px 16px 4px;
      font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--gray-400);
    }
    .section-header.high          { color: #dc2626; }
    .section-header.medium        { color: var(--amber); }
    .section-header.low           { color: var(--green); }
    .section-header.unprio        { color: var(--gray-400); }
    .section-header.pending-accept { color: var(--amber); }
    .section-header.waiting        { color: var(--blue); }

    /* ── Item ── */
    .item-wrap {
      background: white;
      display: flex; flex-direction: column;
      animation: slideIn .12s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .item-main {
      display: flex; align-items: center;
      padding: 11px 16px; gap: 10px;
      cursor: pointer;
    }
    .item-wrap.waiting .item-main { opacity: .7; }

    .check-btn {
      width: 26px; height: 26px; min-width: 26px;
      border-radius: 50%; border: 2px solid var(--gray-200);
      background: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white;
      transition: border-color .15s, background .15s;
    }
    .check-btn svg { width: 14px; height: 14px; }
    .check-btn:hover { border-color: var(--green); }

    .item-body { flex: 1; min-width: 0; }
    .item-name {
      display: block; font-size: .95rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-meta { display: block; font-size: .72rem; color: var(--gray-400); margin-top: 2px; }

    .badge {
      font-size: .7rem; font-weight: 700;
      padding: 2px 6px; border-radius: 999px; white-space: nowrap;
    }
    .badge.prio   { background: var(--green-lt); color: var(--green); }
    .badge.unprio { color: var(--gray-200); font-size: 1rem; }

    .accept-btn {
      font-size: .75rem; font-weight: 600;
      background: var(--amber); color: white;
      border: none; border-radius: 6px; padding: 4px 8px;
      cursor: pointer; white-space: nowrap;
    }
    .accept-btn:hover { background: #b45309; }

    .delete-btn {
      width: 28px; height: 28px; border-radius: 6px;
      border: none; background: transparent; color: var(--gray-400);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s, background .15s, color .15s;
    }
    .delete-btn svg { width: 14px; height: 14px; }
    .item-wrap:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { background: #fee2e2; color: var(--red); }

    /* ── Item actions (expanded) ── */
    .item-actions {
      display: none;
      padding: 0 16px 12px 52px;
      flex-direction: column; gap: 10px;
      border-top: 1px solid var(--gray-100);
    }
    .item-actions.open { display: flex; }
    .action-section { display: flex; flex-direction: column; gap: 6px; }
    .action-label {
      font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--gray-400);
    }
    .action-pills { display: flex; gap: 5px; }
    .move-pill {
      width: 34px; height: 34px; border-radius: 50%; border: none;
      font-size: .72rem; font-weight: 700; color: white;
      cursor: pointer; opacity: 0.5;
      transition: opacity .15s, transform .1s;
    }
    .move-pill:hover { opacity: 1; transform: scale(1.1); }
    .move-pill.current { opacity: 1; box-shadow: 0 0 0 2px white, 0 0 0 4px currentColor; }
    .prio-btns { display: flex; gap: 5px; }
    .prio-btn {
      flex: 1; padding: 6px 2px;
      border-radius: 8px; border: 1.5px solid var(--gray-200);
      font-size: .75rem; font-weight: 600; cursor: pointer;
      background: white; transition: all .15s;
    }
    .prio-btn.high-p   { border-color: #dc2626; color: #dc2626; }
    .prio-btn.medium-p { border-color: var(--amber); color: var(--amber); }
    .prio-btn.low-p    { border-color: var(--green); color: var(--green); }
    .prio-btn.clear-p  { color: var(--gray-400); }
    .prio-btn.active-p.high-p   { background: #dc2626; color: white; }
    .prio-btn.active-p.medium-p { background: var(--amber); color: white; }
    .prio-btn.active-p.low-p    { background: var(--green); color: white; }

    /* ── Empty state ── */
    #empty-state {
      text-align: center; padding: 56px 24px; color: var(--gray-400);
    }
    #empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
    #empty-state p { font-size: .9rem; }
    #empty-state.hidden { display: none; }

    /* ── Tab bar ── */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(var(--tab-h) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: white; border-top: 1px solid var(--gray-200);
      display: flex; z-index: 20;
    }
    .tab-btn {
      flex: 1; border: none; background: transparent;
      font-size: .7rem; font-weight: 500; cursor: pointer;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; padding: 0;
      color: var(--gray-400); transition: color .15s;
    }
    .tab-initial {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; color: white;
      opacity: 0.3; transition: opacity .15s, transform .15s;
    }
    .tab-btn.active .tab-initial { opacity: 1; transform: scale(1.1); }
    .tab-btn.active { color: var(--gray-900); }

    /* ── Birthday tab ── */
    #birthdays { padding: 12px 16px 32px; }
    #birthdays.hidden { display: none; }
    main.hidden { display: none; }
    .add-bar.hidden { display: none; }
    #blurb-card.hidden { display: none; }

    .bday-add-form {
      background: white; border-radius: 12px; padding: 14px;
      margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px;
    }
    .bday-add-form input {
      width: 100%; border: 1.5px solid var(--gray-200); border-radius: 10px;
      padding: 10px 14px; font-size: 1rem; outline: none; font-family: inherit;
    }
    .bday-add-form input:focus { border-color: var(--green); }
    .bday-remind-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .bday-remind-label { font-size: .72rem; color: var(--gray-400); white-space: nowrap; }
    .bday-remind-pills { display: flex; gap: 5px; flex-wrap: wrap; }
    .bday-pill {
      height: 28px; padding: 0 10px; border-radius: 999px; border: none;
      font-size: .72rem; font-weight: 700; color: white; cursor: pointer;
      opacity: 0.35; transition: opacity .15s;
    }
    .bday-pill.on { opacity: 1; }
    #bday-add-btn {
      background: var(--green); color: white; border: none; border-radius: 10px;
      padding: 11px; font-size: .95rem; font-weight: 600; cursor: pointer;
    }
    .bday-card {
      background: white; border-radius: 12px; padding: 14px 16px;
      margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
    }
    .bday-card.today { border-left: 4px solid var(--green); }
    .bday-card.tomorrow { border-left: 4px solid var(--amber); }
    .bday-info { flex: 1; min-width: 0; }
    .bday-name { font-size: .95rem; font-weight: 600; }
    .bday-meta { font-size: .78rem; color: var(--gray-400); margin-top: 2px; }
    .bday-countdown {
      font-size: .78rem; font-weight: 700; padding: 3px 8px;
      border-radius: 999px; white-space: nowrap;
    }
    .bday-countdown.today  { background: var(--green-lt); color: var(--green); }
    .bday-countdown.soon   { background: #fef3c7; color: var(--amber); }
    .bday-countdown.normal { background: var(--gray-100); color: var(--gray-600); }
    .bday-ack-btn {
      background: var(--green); color: white; border: none; border-radius: 8px;
      padding: 6px 12px; font-size: .8rem; font-weight: 600; cursor: pointer;
      white-space: nowrap;
    }
    .bday-ack-btn.acked { background: var(--gray-200); color: var(--gray-400); cursor: default; }
    .bday-del-btn {
      width: 28px; height: 28px; border-radius: 6px; border: none;
      background: transparent; color: var(--gray-400); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s;
    }
    .bday-card:hover .bday-del-btn { opacity: 1; }
    .bday-del-btn:hover { background: #fee2e2; color: var(--red); }
    .bday-empty { color: var(--gray-400); font-size: .88rem; text-align: center; padding: 32px 0; }

    /* ── User modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 24px;
    }
    .modal-backdrop.hidden { display: none; }
    .modal {
      background: white; border-radius: 16px; padding: 28px 24px;
      width: 100%; max-width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .modal p  { font-size: .85rem; color: var(--gray-600); margin-bottom: 16px; }
    .modal-names { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .modal-name-btn {
      flex: 1; min-width: 80px;
      border: 1.5px solid var(--gray-200); border-radius: 10px;
      padding: 8px; font-size: .9rem; font-weight: 500;
      background: white; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .modal-name-btn:hover { border-color: var(--green); background: var(--green-lt); color: var(--green); }
    .modal-divider { text-align: center; font-size: .8rem; color: var(--gray-400); margin-bottom: 12px; }
    .modal input {
      width: 100%; border: 1.5px solid var(--gray-200); border-radius: 10px;
      padding: 10px 14px; font-size: 1rem; outline: none; margin-bottom: 12px;
    }
    .modal input:focus { border-color: var(--green); }
    .modal .save-btn {
      width: 100%; background: var(--green); color: white;
      border: none; border-radius: 10px; padding: 12px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    .modal .save-btn:hover { background: #15803d; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="app-title">✅ Family Todos</div>
    <button id="user-badge">Set name</button>
  </header>

  <!-- Add bar -->
  <div class="add-bar">
    <input id="item-input" type="text" placeholder="Add todo…" autocomplete="off" autocorrect="off" />
    <button id="mic-btn" aria-label="Voice input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="9" y1="22" x2="15" y2="22"/>
      </svg>
    </button>
    <button id="add-btn" aria-label="Add">+</button>
  </div>

  <!-- Blurb card (populated from person_blurbs table) -->
  <div id="blurb-card"></div>

  <!-- List -->
  <main>
    <ul id="item-list"></ul>
    <div id="empty-state">
      <div class="empty-icon">🎉</div>
      <p>All done! Nothing on the list.</p>
    </div>
  </main>

  <!-- Birthdays view -->
  <div id="birthdays" class="hidden">
    <div class="bday-add-form">
      <input id="bday-name-input"  type="text" placeholder="Name…" autocomplete="off" />
      <input id="bday-date-input"  type="text" placeholder="Date (MM-DD, e.g. 03-15)" autocomplete="off" />
      <input id="bday-notes-input" type="text" placeholder="Notes (optional)" autocomplete="off" />
      <div class="bday-remind-row">
        <span class="bday-remind-label">Remind</span>
        <div class="bday-remind-pills" id="bday-remind-pills"></div>
      </div>
      <button id="bday-add-btn">Add Birthday</button>
    </div>
    <div id="bday-list"></div>
  </div>

  <!-- Tab bar (initials/colours injected by JS) -->
  <nav class="tab-bar" id="tab-bar"></nav>

  <!-- Name modal -->
  <div id="user-modal" class="modal-backdrop hidden">
    <div class="modal">
      <h2>Who are you? 👋</h2>
      <p>Tap your name or type it below.</p>
      <div class="modal-names" id="modal-names"></div>
      <div class="modal-divider">or type a name</div>
      <input id="user-name-input" type="text" placeholder="Your name" maxlength="30" />
      <button class="save-btn" id="user-save-btn">Save</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
